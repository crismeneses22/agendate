# Apache vhost for the temporary production URL:
# http://187.127.1.112:8081/
#
# Adjust /var/www/agendate to the real path on the server.
# Build React first with: npm ci && npm run build

Listen 8081

<VirtualHost *:8081>
    ServerName 187.127.1.112
    DocumentRoot /var/www/agendate/dist

    ServerSignature Off

    <Directory /var/www/agendate/dist>
        Options -Indexes -MultiViews +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html

        <IfModule mod_headers.c>
            Header always set X-Frame-Options "DENY"
            Header always set X-Content-Type-Options "nosniff"
            Header always set Referrer-Policy "strict-origin-when-cross-origin"
            Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
            Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
        </IfModule>
    </Directory>

    Alias /api /var/www/agendate/api
    <Directory /var/www/agendate/api>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    Alias /uploads /var/www/agendate/uploads
    <Directory /var/www/agendate/uploads>
        Options -Indexes
        AllowOverride None
        Require all denied

        <FilesMatch "\.(jpe?g|png|webp|gif)$">
            Require all granted
        </FilesMatch>

        <FilesMatch "\.(php|phtml|phar|cgi|pl|shtml|html?|svg|xml|js|css)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/agendate-8081-error.log
    CustomLog ${APACHE_LOG_DIR}/agendate-8081-access.log combined
</VirtualHost>
